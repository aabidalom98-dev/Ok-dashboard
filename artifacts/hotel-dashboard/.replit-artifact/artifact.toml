kind = "web"
previewPath = "/"
title = "Hotel Dashboard"
version = "1.0.0"
id = "artifacts/hotel-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21030

[services.development]
run = "pnpm --filter @workspace/hotel-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-dashboard", "run", "build" ]
publicDir = "artifacts/hotel-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21030"
BASE_PATH = "/"
